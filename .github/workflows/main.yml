name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # Этот шаг скачивает правильную версию Gradle, совместимую с проектом
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.0

    - name: Build with Gradle
      # Добавляем флаги, чтобы игнорировать устаревшие предупреждения
      run: gradle assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
      # Путь может отличаться, проверим этот
        path: app/build/outputs/apk/debug/app-debug.apk
